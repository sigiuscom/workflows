name: yamllint (reusable)

on:
  workflow_call:
    inputs:
      paths:
        description: Space-separated paths/globs to lint
        type: string
        required: false
        default: '.'
      preset:
        description: 'gitops (very lenient) | default (yamllint built-in) | strict'
        type: string
        required: false
        default: 'gitops'
      config-data:
        description: Inline yamllint config (overrides preset)
        type: string
        required: false
        default: ''
      config-file:
        description: Path to .yamllint config (overrides preset and config-data)
        type: string
        required: false
        default: ''
      strict:
        description: Fail on warnings
        type: boolean
        required: false
        default: false
      ignore-helm-templates:
        description: Append **/templates/** to ignore list (Helm Go-templates are not valid YAML)
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  lint:
    if: github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint==1.35.1

      - name: Build config
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.config-file }}" ]; then
            cp "${{ inputs.config-file }}" /tmp/yamllint.yml
          elif [ -n "${{ inputs.config-data }}" ]; then
            cat <<'EOF' > /tmp/yamllint.yml
          ${{ inputs.config-data }}
          EOF
          else
            case "${{ inputs.preset }}" in
              strict)
                echo 'extends: default' > /tmp/yamllint.yml ;;
              default)
                echo 'extends: default' > /tmp/yamllint.yml ;;
              gitops|*)
                cat > /tmp/yamllint.yml <<'YML'
          extends: relaxed
          rules:
            line-length: disable
            empty-lines: disable
            trailing-spaces: { level: warning }
            new-line-at-end-of-file: { level: warning }
            comments: disable
            comments-indentation: disable
            truthy: disable
            document-start: disable
            indentation: { spaces: consistent, indent-sequences: consistent }
            braces: disable
            brackets: disable
            colons: disable
            commas: disable
            hyphens: disable
            key-duplicates: enable
            octal-values: disable
            quoted-strings: disable
          YML
                ;;
            esac
          fi
          if [ "${{ inputs.ignore-helm-templates }}" = "true" ]; then
            cat >> /tmp/yamllint.yml <<'YML'
          ignore: |
            **/templates/**
            **/charts/*/templates/**
            **/_helpers.tpl
            **/node_modules/**
            **/.venv/**
          YML
          fi
          echo '--- effective yamllint config ---'
          cat /tmp/yamllint.yml

      - name: Lint
        run: |
          set -euo pipefail
          ARGS=(-c /tmp/yamllint.yml -f github)
          [ "${{ inputs.strict }}" = "true" ] && ARGS+=(--strict)
          yamllint "${ARGS[@]}" ${{ inputs.paths }}

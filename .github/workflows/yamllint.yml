name: yamllint (reusable)

on:
  workflow_call:
    inputs:
      paths:
        description: Space-separated paths/globs to lint
        type: string
        required: false
        default: '.'
      config-data:
        description: Inline yamllint config (overrides config-file)
        type: string
        required: false
        default: ''
      config-file:
        description: Path to .yamllint config (optional)
        type: string
        required: false
        default: ''
      strict:
        description: Fail on warnings
        type: boolean
        required: false
        default: false
      ignore-helm-templates:
        description: Add **/templates/** to ignore list (Helm Go-templates are not valid YAML)
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint==1.35.1

      - name: Build config
        id: cfg
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.config-data }}" ]; then
            printf '%s\n' "${{ inputs.config-data }}" > /tmp/yamllint.yml
          elif [ -n "${{ inputs.config-file }}" ]; then
            cp "${{ inputs.config-file }}" /tmp/yamllint.yml
          else
            echo 'extends: default' > /tmp/yamllint.yml
          fi
          if [ "${{ inputs.ignore-helm-templates }}" = "true" ]; then
            cat >> /tmp/yamllint.yml <<'YML'
          ignore: |
            **/templates/**
            **/charts/*/templates/**
            **/_helpers.tpl
          YML
          fi
          echo '--- yamllint config ---'
          cat /tmp/yamllint.yml

      - name: Lint
        run: |
          set -euo pipefail
          ARGS=(-c /tmp/yamllint.yml -f github)
          [ "${{ inputs.strict }}" = "true" ] && ARGS+=(--strict)
          yamllint "${ARGS[@]}" ${{ inputs.paths }}

name: helm-lint (reusable)

on:
  workflow_call:
    inputs:
      charts-dir:
        description: Root dir to scan for Helm charts (Chart.yaml)
        type: string
        required: false
        default: 'charts'
      helm-version:
        type: string
        required: false
        default: 'v3.16.2'
      kubeconform-version:
        type: string
        required: false
        default: 'v0.6.7'
      kubernetes-version:
        description: K8s API version for kubeconform validation
        type: string
        required: false
        default: '1.31.0'
      schema-locations:
        description: Additional kubeconform schema locations (multi-line)
        type: string
        required: false
        default: |
          https://cdn.jsdelivr.net/gh/yannh/kubernetes-json-schema@master/v{{.NormalizedKubernetesVersion}}-standalone-strict/{{.ResourceKind}}{{.KindSuffix}}.json
          default
          https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
          https://cdn.jsdelivr.net/gh/datreeio/CRDs-catalog@main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json

permissions:
  contents: read

jobs:
  lint:
    if: github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ inputs.helm-version }}

      - name: Install kubeconform
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${{ inputs.kubeconform-version }}/kubeconform-linux-amd64.tar.gz" \
            | tar -xzC "$RUNNER_TEMP/bin" kubeconform
          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          kubeconform -v

      - name: helm lint
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          fail=0
          for chart in ${{ inputs.charts-dir }}/**/Chart.yaml; do
            dir=$(dirname "$chart")
            echo "::group::helm lint $dir"
            if ! helm lint "$dir"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: helm template + kubeconform
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          SCHEMA_ARGS=()
          while IFS= read -r loc; do
            [ -z "$loc" ] && continue
            SCHEMA_ARGS+=(-schema-location "$loc")
          done <<< "${{ inputs.schema-locations }}"

          fail=0
          for chart in ${{ inputs.charts-dir }}/**/Chart.yaml; do
            dir=$(dirname "$chart")
            name=$(basename "$dir")
            echo "::group::kubeconform $name"
            if ! helm template "$name" "$dir" 2>/dev/null | \
              kubeconform -strict -ignore-missing-schemas \
                -kubernetes-version "${{ inputs.kubernetes-version }}" \
                "${SCHEMA_ARGS[@]}"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

name: docker-build (reusable)

on:
  workflow_call:
    inputs:
      context:
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Path to Dockerfile (default = {context}/Dockerfile)
        type: string
        required: false
        default: ''
      image:
        description: Full image name without tag (e.g. ghcr.io/sigiuscom/foo)
        type: string
        required: true
      push:
        description: Push images when true; false runs a build-only validation
        type: boolean
        required: false
        default: false
      platforms:
        type: string
        required: false
        default: 'linux/amd64'
      build-args:
        type: string
        required: false
        default: ''
      registry-mirrors:
        description: Newline-separated Kaniko registry mirrors for Docker Hub pulls
        type: string
        required: false
        default: ''
      registry-maps:
        description: Newline-separated Kaniko registry map entries, e.g. index.docker.io=mirror.local:5000
        type: string
        required: false
        default: ''
      insecure-registries:
        description: Newline-separated registries Kaniko may use over plain HTTP
        type: string
        required: false
        default: ''
      image-download-retry:
        description: Number of retries for Kaniko base image downloads
        type: string
        required: false
        default: '3'
      registry:
        type: string
        required: false
        default: 'ghcr.io'
      version:
        description: Explicit semver to tag with (e.g. 1.2.3). Generates :1.2.3, :1.2, :1, :latest.
        type: string
        required: false
        default: ''
      ref:
        description: Git ref to check out (default = caller's ref). Useful when bump-version pushed a tag.
        type: string
        required: false
        default: ''
      trivy-scan:
        description: Run Trivy vulnerability scan on the built image (requires push=true)
        type: boolean
        required: false
        default: true
      trivy-severity:
        description: Trivy severity filter
        type: string
        required: false
        default: 'HIGH,CRITICAL'
      trivy-ignore-unfixed:
        description: Ignore unfixed vulnerabilities
        type: boolean
        required: false
        default: true
    secrets:
      GHCR_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: aks-self-hosted
    outputs:
      image-tag: ${{ steps.tags.outputs.primary }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      KANIKO_NAMESPACE: ci-builds
      KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.24.0-debug
    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.platforms }}" != "linux/amd64" ]; then
            echo "::error::Kaniko workflow currently supports linux/amd64 only, got '${{ inputs.platforms }}'"
            exit 1
          fi
          retry="${{ inputs.image-download-retry }}"
          if [ -z "$retry" ]; then
            echo "::error::image-download-retry must be a non-negative integer"
            exit 1
          fi
          case "$retry" in
            *[!0-9]*)
              echo "::error::image-download-retry must be a non-negative integer, got '${retry}'"
              exit 1
              ;;
          esac

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl https://dl.k8s.io/release/v1.36.1/bin/linux/amd64/kubectl
          chmod +x /tmp/kubectl
          /tmp/kubectl version --client=true

      - name: Configure in-cluster kubectl
        run: |
          server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
          token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
          ca="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          /tmp/kubectl config set-cluster in-cluster --server="$server" --certificate-authority="$ca"
          /tmp/kubectl config set-credentials runner --token="$token"
          /tmp/kubectl config set-context in-cluster --cluster=in-cluster --user=runner --namespace="$KANIKO_NAMESPACE"
          /tmp/kubectl config use-context in-cluster
          /tmp/kubectl auth can-i create jobs.batch -n "$KANIKO_NAMESPACE"

      - name: Build image with Kaniko
        id: tags
        env:
          INPUT_CONTEXT: ${{ inputs.context }}
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_PUSH: ${{ inputs.push }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_BUILD_ARGS: ${{ inputs.build-args }}
          INPUT_REGISTRY_MIRRORS: ${{ inputs.registry-mirrors }}
          INPUT_REGISTRY_MAPS: ${{ inputs.registry-maps }}
          INPUT_INSECURE_REGISTRIES: ${{ inputs.insecure-registries }}
          INPUT_IMAGE_DOWNLOAD_RETRY: ${{ inputs.image-download-retry }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          job="kaniko-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RANDOM}"
          docker_secret="${job}-docker"
          git_secret="${job}-git"
          ref="${INPUT_REF:-$GITHUB_REF}"
          context="${INPUT_CONTEXT#./}"
          if [ -z "$context" ]; then
            context="."
          fi

          dockerfile="$INPUT_DOCKERFILE"
          if [ -z "$dockerfile" ]; then
            dockerfile="Dockerfile"
          else
            dockerfile="${dockerfile#./}"
            if [ "$context" != "." ]; then
              prefix="${context%/}/"
              dockerfile="${dockerfile#$prefix}"
            fi
          fi

          ref_name="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA:0:7}"
          tags_file="/tmp/${job}-tags.txt"
          : > "$tags_file"
          if [ -n "$INPUT_VERSION" ]; then
            version="${INPUT_VERSION#v}"
            echo "${INPUT_IMAGE}:${version}" >> "$tags_file"
            major_minor="$(printf '%s' "$version" | awk -F. '{print $1"."$2}')"
            major="$(printf '%s' "$version" | awk -F. '{print $1}')"
            echo "${INPUT_IMAGE}:${major_minor}" >> "$tags_file"
            echo "${INPUT_IMAGE}:${major}" >> "$tags_file"
            echo "${INPUT_IMAGE}:latest" >> "$tags_file"
          else
            echo "${INPUT_IMAGE}:${ref_name}" >> "$tags_file"
            echo "${INPUT_IMAGE}:${ref_name}-${short_sha}" >> "$tags_file"
          fi

          primary_tag="$(head -1 "$tags_file")"
          echo "primary=${primary_tag}" >> "$GITHUB_OUTPUT"

          /tmp/kubectl delete job "$job" -n "$KANIKO_NAMESPACE" --ignore-not-found
          /tmp/kubectl delete secret "$docker_secret" "$git_secret" -n "$KANIKO_NAMESPACE" --ignore-not-found
          /tmp/kubectl create secret docker-registry "$docker_secret" \
            --namespace "$KANIKO_NAMESPACE" \
            --docker-server "$INPUT_REGISTRY" \
            --docker-username "$GITHUB_ACTOR" \
            --docker-password "${GHCR_TOKEN:-$GH_TOKEN}"
          /tmp/kubectl create secret generic "$git_secret" \
            --namespace "$KANIKO_NAMESPACE" \
            --from-literal=GIT_USERNAME="$GITHUB_ACTOR" \
            --from-literal=GIT_PASSWORD="$GH_TOKEN"

          args_file="/tmp/${job}-args.yaml"
          : > "$args_file"
          add_arg() {
            printf '                - %s\n' "$1" >> "$args_file"
          }

          github_host="${GITHUB_SERVER_URL#https://}"
          add_arg "--context=git://${github_host}/${GITHUB_REPOSITORY}.git#${ref}"
          if [ "$context" != "." ]; then
            add_arg "--context-sub-path=${context}"
          fi
          add_arg "--dockerfile=${dockerfile}"
          add_arg "--verbosity=info"
          add_arg "--push-retry=2"
          if [ "$INPUT_IMAGE_DOWNLOAD_RETRY" != "0" ]; then
            add_arg "--image-download-retry=${INPUT_IMAGE_DOWNLOAD_RETRY}"
          fi
          if [ "$INPUT_PUSH" != "true" ]; then
            add_arg "--no-push"
          fi
          while IFS= read -r registry_mirror; do
            if [ -n "$registry_mirror" ]; then
              add_arg "--registry-mirror=${registry_mirror}"
            fi
          done <<EOF_REGISTRY_MIRRORS
          $INPUT_REGISTRY_MIRRORS
          EOF_REGISTRY_MIRRORS
          while IFS= read -r registry_map; do
            if [ -n "$registry_map" ]; then
              add_arg "--registry-map=${registry_map}"
            fi
          done <<EOF_REGISTRY_MAPS
          $INPUT_REGISTRY_MAPS
          EOF_REGISTRY_MAPS
          while IFS= read -r insecure_registry; do
            if [ -n "$insecure_registry" ]; then
              add_arg "--insecure-registry=${insecure_registry}"
            fi
          done <<EOF_INSECURE_REGISTRIES
          $INPUT_INSECURE_REGISTRIES
          EOF_INSECURE_REGISTRIES
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              add_arg "--destination=${tag}"
            fi
          done < "$tags_file"
          while IFS= read -r build_arg; do
            if [ -n "$build_arg" ]; then
              add_arg "--build-arg=${build_arg}"
            fi
          done <<EOF_BUILD_ARGS
          $INPUT_BUILD_ARGS
          EOF_BUILD_ARGS

          cat > "/tmp/${job}.yaml" <<EOF_JOB
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${job}
            namespace: ${KANIKO_NAMESPACE}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 3600
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: ${job}
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: ${KANIKO_IMAGE}
                    args:
          $(cat "$args_file")
                    env:
                      - name: DOCKER_CONFIG
                        value: /kaniko/.docker
                      - name: GIT_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: ${git_secret}
                            key: GIT_USERNAME
                      - name: GIT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: ${git_secret}
                            key: GIT_PASSWORD
                    volumeMounts:
                      - name: docker-config
                        mountPath: /kaniko/.docker
                    resources:
                      requests:
                        cpu: 500m
                        memory: 1Gi
                      limits:
                        cpu: "2"
                        memory: 4Gi
                volumes:
                  - name: docker-config
                    projected:
                      sources:
                        - secret:
                            name: ${docker_secret}
                            items:
                              - key: .dockerconfigjson
                                path: config.json
          EOF_JOB

          /tmp/kubectl apply -f "/tmp/${job}.yaml"
          status=1
          for _ in $(seq 1 180); do
            complete="$(/tmp/kubectl get "job/${job}" -n "$KANIKO_NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)"
            failed="$(/tmp/kubectl get "job/${job}" -n "$KANIKO_NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)"
            if [ "$complete" = "True" ]; then
              status=0
              break
            fi
            if [ "$failed" = "True" ]; then
              status=1
              break
            fi
            sleep 5
          done
          /tmp/kubectl logs "job/${job}" -n "$KANIKO_NAMESPACE" --tail=-1
          /tmp/kubectl delete secret "$docker_secret" "$git_secret" -n "$KANIKO_NAMESPACE" --ignore-not-found
          if [ "$status" -ne 0 ]; then
            /tmp/kubectl describe "job/${job}" -n "$KANIKO_NAMESPACE"
            exit "$status"
          fi

  scan:
    if: ${{ inputs.trivy-scan && inputs.push }}
    needs: build
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: .trivyignore
          sparse-checkout-cone-mode: false

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
          TRIVY_IMAGE_SRC: remote
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          scanners: 'vuln'
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
          exit-code: '1'
          trivyignores: '.trivyignore'

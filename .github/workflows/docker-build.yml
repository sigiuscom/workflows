name: docker-build (reusable)

on:
  workflow_call:
    inputs:
      context:
        type: string
        required: false
        default: '.'
      dockerfile:
        description: Path to Dockerfile (default = {context}/Dockerfile)
        type: string
        required: false
        default: ''
      image:
        description: Full image name without tag (e.g. ghcr.io/sigiuscom/foo)
        type: string
        required: true
      push:
        type: boolean
        required: false
        default: false
      platforms:
        type: string
        required: false
        default: 'linux/amd64'
      build-args:
        type: string
        required: false
        default: ''
      registry:
        type: string
        required: false
        default: 'ghcr.io'
      version:
        description: Explicit semver to tag with (e.g. 1.2.3). Generates :1.2.3, :1.2, :1, :latest.
        type: string
        required: false
        default: ''
      ref:
        description: Git ref to check out (default = caller's ref). Useful when bump-version pushed a tag.
        type: string
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        if: contains(inputs.platforms, ',')

      - name: Login
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }}-${{ github.sha }},enable=${{ inputs.version != '' }},priority=100
          flavor: |
            latest=${{ inputs.version != '' }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile || format('{0}/Dockerfile', inputs.context) }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

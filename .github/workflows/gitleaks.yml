name: gitleaks (reusable)

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to .gitleaks.toml (optional)
        type: string
        required: false
        default: ''
    secrets:
      GITLEAKS_LICENSE:
        required: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff9810194c7f4cebdf69a52ff8eebd1d2bf3f6cb # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_CONFIG: ${{ inputs.config-path }}

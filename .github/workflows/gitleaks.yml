name: gitleaks (reusable)

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to .gitleaks.toml (optional)
        type: string
        required: false
        default: ''
      gitleaks-version:
        description: gitleaks binary version
        type: string
        required: false
        default: '8.21.2'
      scan-mode:
        description: 'dir (working tree only, default) | detect (full git history) | git (since last push)'
        type: string
        required: false
        default: 'dir'

permissions:
  contents: read

jobs:
  scan:
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VER="${{ inputs.gitleaks-version }}"
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Scan
        run: |
          set -euo pipefail
          # Build effective config: user override > repo .gitleaks.toml > built-in default
          if [ -n "${{ inputs.config-path }}" ]; then
            CFG="${{ inputs.config-path }}"
          elif [ -f .gitleaks.toml ]; then
            CFG=".gitleaks.toml"
          else
            cat > /tmp/gitleaks.toml <<'TOML'
          # sigiuscom default: extend gitleaks defaults + allowlist GitOps noise
          [extend]
          useDefault = true

          [allowlist]
          description = "GitOps and SealedSecret encrypted payloads (not plaintext)"
          paths = [
            '''(^|/)sealed[-_]?secrets?/.*\.ya?ml$''',
            '''.*\.sealed\.ya?ml$''',
            '''(^|/)argocd/secrets/.*\.ya?ml$''',
            '''.*sealed-secret\.ya?ml$''',
          ]
          regexes = [
            # Bitnami SealedSecret encrypted blobs always start with Ag[A-D] and are 100+ chars
            '''Ag[A-D][A-Za-z0-9+/=]{100,}''',
          ]
          TOML
            CFG="/tmp/gitleaks.toml"
          fi
          echo "Using config: $CFG"
          gitleaks ${{ inputs.scan-mode }} \
            --config="$CFG" \
            --no-banner \
            --redact \
            --verbose \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif \
            --exit-code 1

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gitleaks-sarif
          path: /tmp/gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 7

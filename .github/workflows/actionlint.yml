name: actionlint (reusable)

on:
  workflow_call:
    inputs:
      paths:
        type: string
        required: false
        default: '.github/workflows'

permissions:
  contents: read

jobs:
  lint:
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        run: |
          set -euo pipefail
          version='1.7.7'
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_Linux_x86_64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"
      - name: Validate workflows
        run: actionlint ${{ inputs.paths }}/*.yml ${{ inputs.paths }}/*.yaml

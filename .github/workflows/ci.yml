name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: aks-self-hosted
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        run: |
          set -euo pipefail
          version='1.7.7'
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_Linux_x86_64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"
      - name: Lint workflows
        run: |
          actionlint \
            -ignore 'label "aks-self-hosted" is unknown' \
            -ignore 'shellcheck reported issue in this script' \
            .github/workflows/*.yml

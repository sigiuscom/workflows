name: python-app (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
        default: '.'
      python-version:
        type: string
        required: false
        default: '3.12'
      install-cmd:
        description: Override default install command
        type: string
        required: false
        default: ''
      lint:
        type: boolean
        required: false
        default: true
      typecheck:
        type: boolean
        required: false
        default: false
      tests:
        type: boolean
        required: false
        default: true
      test-cmd:
        type: string
        required: false
        default: 'pytest -v --tb=short'

permissions:
  contents: read

jobs:
  ci:
    if: github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install
        env:
          INSTALL_CMD: ${{ inputs.install-cmd }}
        run: |
          set -e
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          elif [ -f pyproject.toml ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
          fi
          pip install ruff pytest

      - name: Lint (ruff)
        if: inputs.lint
        run: ruff check .

      - name: Typecheck (mypy)
        if: inputs.typecheck
        run: pip install mypy && mypy .

      - name: Test
        if: inputs.tests
        run: ${{ inputs.test-cmd }}

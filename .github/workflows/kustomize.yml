name: kustomize (reusable)

on:
  workflow_call:
    inputs:
      paths:
        type: string
        required: false
        default: '.'

permissions:
  contents: read

jobs:
  validate:
    runs-on: aks-self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Install kustomize
        run: |
          set -euo pipefail
          version='5.7.1'
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${version}/kustomize_v${version}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Build overlays
        env:
          PATHS: ${{ inputs.paths }}
        run: |
          set -euo pipefail
          for path in $PATHS; do
            if [ -f "$path/kustomization.yaml" ] || [ -f "$path/kustomization.yml" ]; then
              kustomize build "$path" >/dev/null
            fi
          done
